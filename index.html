<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHASHAANK REDDY — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black:   #080808;
      --white:   #e8e8e8;
      --red:     #ff003c;
      --cyan:    #00f5ff;
      --yellow:  #f5e642;
      --dim:     rgba(232,232,232,0.18);
      --scanline: rgba(0,0,0,0.45);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 160px 160px;
      pointer-events: none;
      z-index: 10;
      opacity: 0.55;
    }

    /* ── CRT Scanlines ── */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        var(--scanline) 3px,
        var(--scanline) 4px
      );
      animation: scanroll 8s linear infinite;
    }

    @keyframes scanroll {
      0%   { background-position: 0 0; }
      100% { background-position: 0 400px; }
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* ── Corner decorations ── */
    .corner {
      position: fixed;
      width: 60px;
      height: 60px;
      pointer-events: none;
      z-index: 25;
      opacity: 0.35;
    }
    .corner--tl { top: 20px; left: 20px;  border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
    .corner--tr { top: 20px; right: 20px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
    .corner--bl { bottom: 20px; left: 20px;  border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
    .corner--br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

    /* ── Main container ── */
    .stage {
      position: relative;
      z-index: 30;
      text-align: center;
      padding: 0 24px;
      user-select: none;
    }

    /* ── System label ── */
    .sys-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: 0.35em;
      color: var(--cyan);
      opacity: 0.6;
      margin-bottom: 2.5rem;
      animation: flicker 6s infinite;
    }

    /* ── NAME — glitch ── */
    .glitch-name {
      font-family: 'VT323', monospace;
      font-size: clamp(52px, 10vw, 130px);
      line-height: 1;
      color: var(--white);
      letter-spacing: 0.04em;
      position: relative;
      display: inline-block;
      animation: glitch-main 3.5s infinite;
    }

    .glitch-name::before,
    .glitch-name::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      display: block;
    }

    .glitch-name::before {
      color: var(--red);
      animation: glitch-before 3.5s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
    }

    .glitch-name::after {
      color: var(--cyan);
      animation: glitch-after 3.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    }

    @keyframes glitch-main {
      0%,  94%               { transform: none; opacity: 1; }
      95%                    { transform: skewX(-1.5deg); opacity: 0.9; }
      96%                    { transform: skewX(2deg) translateX(3px); }
      97%                    { transform: none; opacity: 1; }
      98%                    { transform: translateX(-4px) skewX(-2deg); opacity: 0.85; }
      99%                    { transform: none; }
      100%                   { transform: none; opacity: 1; }
    }

    @keyframes glitch-before {
      0%,  90%               { transform: none; opacity: 0; }
      91%                    { transform: translateX(-6px); opacity: 0.8; clip-path: polygon(0 15%, 100% 15%, 100% 35%, 0 35%); }
      92%                    { transform: translateX(4px);  opacity: 0.6; clip-path: polygon(0 55%, 100% 55%, 100% 70%, 0 70%); }
      93%                    { transform: none; opacity: 0; }
      97%                    { transform: translateX(-3px); opacity: 0.7; clip-path: polygon(0 5%,  100% 5%,  100% 25%, 0 25%); }
      98%                    { opacity: 0; }
    }

    @keyframes glitch-after {
      0%,  90%               { transform: none; opacity: 0; }
      91%                    { transform: translateX(6px);  opacity: 0.75; clip-path: polygon(0 65%, 100% 65%, 100% 80%, 0 80%); }
      92%                    { transform: translateX(-5px); opacity: 0.5; clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); }
      93%                    { transform: none; opacity: 0; }
      97%                    { transform: translateX(4px);  opacity: 0.7; clip-path: polygon(0 80%, 100% 80%, 100% 95%, 0 95%); }
      98%                    { opacity: 0; }
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 1.6rem auto;
      width: min(520px, 90vw);
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dim), transparent);
    }
    .divider-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.6); }
    }

    /* ── COMING SOON ── */
    .coming-soon {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(13px, 2.4vw, 22px);
      letter-spacing: 0.55em;
      color: var(--white);
      opacity: 0.72;
      position: relative;
      display: inline-block;
      animation: glitch-sub 7s infinite;
    }

    @keyframes glitch-sub {
      0%, 88%, 100%  { transform: none; opacity: 0.72; text-shadow: none; }
      89%            { transform: translateX(2px); text-shadow: -2px 0 var(--red); opacity: 0.9; }
      90%            { transform: translateX(-2px); text-shadow: 2px 0 var(--cyan); }
      91%            { transform: none; opacity: 0.72; text-shadow: none; }
      95%            { transform: translateX(1px); opacity: 0.85; text-shadow: -1px 0 var(--red); }
      96%            { transform: none; opacity: 0.72; }
    }

    /* ── Loading bar ── */
    .loader-wrap {
      margin: 2.8rem auto 0;
      width: min(300px, 80vw);
    }
    .loader-meta {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.2em;
      opacity: 0.35;
      margin-bottom: 8px;
      color: var(--cyan);
    }
    .loader-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }
    .loader-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      animation: loadprogress 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes loadprogress {
      0%   { width: 0%; opacity: 1; }
      70%  { width: 87%; opacity: 1; }
      85%  { width: 87%; opacity: 0.6; }
      90%  { width: 93%; opacity: 1; }
      100% { width: 93%; opacity: 0.3; }
    }

    /* ── Cursor line ── */
    .cursor-line {
      margin-top: 3rem;
      font-size: clamp(10px, 1.4vw, 13px);
      color: var(--dim);
      letter-spacing: 0.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .cursor-blink {
      display: inline-block;
      width: 8px;
      height: 1.1em;
      background: var(--white);
      opacity: 0.7;
      animation: blink 1.1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 0; }
    }

    /* ── Flicker utility ── */
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 0.6; }
      20%, 22%, 24%                           { opacity: 0.2; }
      55%                                     { opacity: 0.4; }
    }

    /* ── Horizontal tear lines (random) ── */
    .tear {
      position: fixed;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--red);
      opacity: 0;
      pointer-events: none;
      z-index: 35;
      animation: tearline 9s infinite;
    }
    .tear:nth-child(1) { top: 33%; animation-delay: 0s;   animation-duration: 7s; }
    .tear:nth-child(2) { top: 61%; animation-delay: 3.2s; animation-duration: 11s; background: var(--cyan); }

    @keyframes tearline {
      0%, 89%, 91%, 93%, 100% { opacity: 0; transform: none; }
      90%   { opacity: 0.5; transform: translateX(-8px) scaleY(1.5); }
      92%   { opacity: 0.3; transform: translateX(5px); }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .corner { width: 36px; height: 36px; }
      .loader-wrap { margin-top: 2rem; }
      .cursor-line { margin-top: 2rem; }
    }
  </style>
</head>
<body>

  <!-- Overlays -->
  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="tear"></div>
  <div class="tear"></div>

  <!-- Corner brackets -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Main content -->
  <main class="stage">
    <p class="sys-label">PORTFOLIO_SYS &nbsp;/&nbsp; INIT_SEQUENCE_ACTIVE</p>

    <h1 class="glitch-name" data-text="SHASHAANK REDDY">SHASHAANK REDDY</h1>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <p class="coming-soon">— &nbsp; COMING SOON &nbsp; —</p>

    <div class="loader-wrap">
      <div class="loader-meta">
        <span>BUILDING</span>
        <span id="pct">0%</span>
      </div>
      <div class="loader-track">
        <div class="loader-fill" id="fill"></div>
      </div>
    </div>

    <p class="cursor-line">
      <span id="typeout"></span><span class="cursor-blink"></span>
    </p>
  </main>

  <script>
    // ── Percentage counter synced to CSS animation ──
    (function () {
      const pct = document.getElementById('pct');
      const fill = document.getElementById('fill');
      const steps = [
        { at: 0,    val: 0  },
        { at: 4200, val: 87 },
        { at: 5100, val: 87 },
        { at: 5400, val: 93 },
        { at: 6000, val: 93 },
      ];
      let start = null;
      function tick(ts) {
        if (!start) start = ts;
        const elapsed = (ts - start) % 6000;
        let v = 0;
        for (let i = steps.length - 1; i >= 0; i--) {
          if (elapsed >= steps[i].at) { v = steps[i].val; break; }
        }
        pct.textContent = v + '%';
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    })();

    // ── Typewriter ──
    (function () {
      const el = document.getElementById('typeout');
      const msgs = [
        'initialising stack...',
        'compiling assets...',
        'loading modules...',
        'await portfolio.launch()',
        'ETA: soon™',
      ];
      let mi = 0, ci = 0, deleting = false, pause = 0;
      function type() {
        const msg = msgs[mi];
        if (pause > 0) { pause--; setTimeout(type, 50); return; }
        if (!deleting) {
          el.textContent = msg.slice(0, ++ci);
          if (ci === msg.length) { deleting = true; pause = 40; }
          setTimeout(type, 60 + Math.random() * 40);
        } else {
          el.textContent = msg.slice(0, --ci);
          if (ci === 0) { deleting = false; mi = (mi + 1) % msgs.length; pause = 8; }
          setTimeout(type, 30);
        }
      }
      setTimeout(type, 800);
    })();

    // ── Occasional full-screen glitch flash ──
    (function () {
      function flash() {
        const d = document.createElement('div');
        Object.assign(d.style, {
          position: 'fixed', inset: 0, zIndex: 40,
          background: `rgba(${Math.random()>0.5?'255,0,60':'0,245,255'},0.04)`,
          pointerEvents: 'none',
          mixBlendMode: 'screen',
        });
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 80 + Math.random() * 120);
        setTimeout(flash, 4000 + Math.random() * 8000);
      }
      setTimeout(flash, 3000);
    })();
  </script>
</body>
</html>
